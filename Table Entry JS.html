<!DOCTYPE html>
<html>
    <head>
        <title>Salary Table</title>
        <style>
            .divi{
                display:flex;
                align-items: center;
                justify-content: center;
                width: 50%;
                background-color: rgb(251, 250, 248);
                margin: 50px auto;
                
            }
            th, td {
                padding: 8px;
                text-align: left;
                font-size: 30px;
                font-family: 'Courier New', Courier, monospace;
            }
        </style>
    </head>
    <body style="background-color: lightblue;">
        <div class="divi">
            <table  id="myTable" border="1">
    <tr>
        <th>Name</th>
        <th>Salary</th>
        <th>Net Salary</th>
    </tr>
</table>

        </div>
<script>
let table = document.getElementById("myTable");
let n = prompt("How many students?");
let salary;
function calculateNetSalary(salary) {
    if(salary < 60000) {
        return salary - (salary * 0); // 10% deduction
    } else if(salary >= 60001 && salary < 100000) {
        return salary - (salary * 0.1); // 15% deduction
    } else if(salary >= 100001 && salary < 200000) {
        return salary - (salary * 0.2); // 20% deduction
    }else {
        return salary - (salary * 0.3); // 30% deduction
    }
     
}

for (let i = 0; i < n; i++) {
    let name = prompt("Enter name:");
    let salary = prompt("Enter salary:");
    let netSalary = calculateNetSalary(salary);

    let row = table.insertRow();
    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = salary;
    row.insertCell(2).innerHTML = netSalary;
}
</script>

</body>
</html>
